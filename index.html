<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technivel Master Center</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-base: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --offline: #64748b;
        }

        body {
            margin: 0; padding: 20px;
            background: var(--bg-base);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-main);
        }

        h1 { text-align: center; color: var(--accent); margin-bottom: 30px; letter-spacing: 2px;}

        /* Grid dos Cards Superiores */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-top: 4px solid var(--offline);
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-5px); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        .card-title { font-size: 1.2rem; font-weight: bold; margin: 0; cursor: pointer; transition: color 0.2s;}
        .card-title:hover { color: var(--accent); }
        
        .card-status { font-size: 0.8rem; padding: 4px 8px; border-radius: 12px; font-weight: bold; }

        .level-display { font-size: 3rem; font-weight: bold; text-align: center; margin: 10px 0; }
        .last-update { font-size: 0.75rem; color: var(--text-muted); text-align: center; }

        /* Cores de Status dos Cards */
        .status-online { border-top-color: var(--success); }
        .status-online .card-status { background: rgba(16, 185, 129, 0.2); color: var(--success); }

        .status-offline { border-top-color: var(--offline); opacity: 0.7; }
        .status-offline .card-status { background: rgba(100, 116, 139, 0.2); color: var(--offline); }

        .status-warning { border-top-color: var(--warning); }
        .status-warning .card-status { background: rgba(245, 158, 11, 0.2); color: var(--warning); }

        .status-danger { border-top-color: var(--danger); }
        .status-danger .card-status { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        /* Área do Gráfico */
        .chart-section {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .chart-controls {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
        }

        select {
            padding: 10px; border-radius: 8px;
            background: var(--bg-base); color: var(--text-main);
            border: 1px solid var(--text-muted); font-family: inherit;
            outline: none; cursor: pointer;
        }

        .chart-container { position: relative; height: 400px; width: 100%; }
    </style>
</head>
<body>

    <h1>TECHNIVEL MASTER CENTER</h1>

    <div class="cards-grid" id="cards-container">
        Carregando dados da nuvem...
    </div>

    <div class="chart-section">
        <div class="chart-controls">
            <h2 style="margin:0;">Histórico de Consumo</h2>
            <select id="client-selector" onchange="atualizarGrafico()">
                <option value="">Selecione um cliente...</option>
            </select>
        </div>
        <div class="chart-container">
            <canvas id="historyChart"></canvas>
        </div>
    </div>

    <script>
        // ==========================================
        // 0. PROTEÇÃO DE ACESSO (SENHA DO PAINEL)
        // ==========================================
        const SENHA_MESTRA = "1234"; // Mude para a sua senha secreta
        let acesso = localStorage.getItem("technivel_acesso");

        if (acesso !== "concedido") {
            const tentativa = prompt("🔒 Área Restrita. Digite a Senha Mestra:");
            if (tentativa === SENHA_MESTRA) {
                localStorage.setItem("technivel_acesso", "concedido");
            } else {
                alert("Senha Incorreta!");
                window.location.href = "about:blank"; // Limpa a tela se errar
            }
        }

        // ==========================================
        // 1. CONFIGURAÇÃO DO FIREBASE
        // ==========================================
        const firebaseConfig = {
            databaseURL: "https://technivel-master-default-rtdb.firebaseio.com",
            projectId: "technivel-master"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let clientesData = {};
        let myChart = null;

        // ==========================================
        // 2. ESCUTAR BANCO DE DADOS EM TEMPO REAL
        // ==========================================
        db.ref('clientes').on('value', (snapshot) => {
            clientesData = snapshot.val() || {};
            renderizarCards();
            atualizarDropdownList();
            
            const selectedId = document.getElementById('client-selector').value;
            if (selectedId) atualizarGrafico();
        });

        // ==========================================
        // 3. FUNÇÃO: RENOMEAR E CADASTRAR E-MAIL
        // ==========================================
        function renomearCliente(id, nomeAtual, emailAtual) {
            const novoNome = prompt(`Digite o nome do cliente (ID: ${id}):`, nomeAtual === id ? "" : nomeAtual);
            
            if (novoNome !== null && novoNome.trim() !== "") {
                const novoEmail = prompt(`Qual o e-mail do cliente ${novoNome}?\n(Deixe em branco se não quiser que ele receba os alertas da caixa)`, emailAtual || "");
                
                if (novoEmail !== null) {
                    db.ref('clientes/' + id).update({
                        nome: novoNome.trim(),
                        email_cliente: novoEmail.trim()
                    });
                }
            }
        }

        // ==========================================
        // 4. DESENHAR OS CARDS NA TELA
        // ==========================================
        function renderizarCards() {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';

            const ids = Object.keys(clientesData);
            if (ids.length === 0) {
                container.innerHTML = '<p style="color: #94a3b8;">Nenhum equipamento reportou dados ainda.</p>';
                return;
            }

            ids.forEach(id => {
                const dados = clientesData[id];
                const nivel = dados.nivel_atual;
                const statusStr = dados.status; 
                const ultima = dados.ultima_leitura || "Desconhecido";
                
                const nomeCliente = dados.nome || id;
                const emailCliente = dados.email_cliente || ""; 
                
                let cardClass = "status-online"; 
                let statusBadge = "OK";

                if (statusStr === "OFFLINE") { 
                    cardClass = "status-offline"; statusBadge = "CAIU"; 
                } else if (nivel <= 25) { 
                    cardClass = "status-danger"; statusBadge = "CRÍTICO"; 
                } else if (nivel <= 50) { 
                    cardClass = "status-warning"; statusBadge = "ALERTA"; 
                }

                const html = `
                    <div class="card ${cardClass}">
                        <div class="card-header">
                            <h3 class="card-title" onclick="renomearCliente('${id}', '${nomeCliente}', '${emailCliente}')" title="Clique para editar Nome e E-mail">
                                ${nomeCliente} ✏️
                            </h3>
                            <span class="card-status">${statusBadge}</span>
                        </div>
                        <div style="font-size: 0.7rem; color: var(--text-muted); margin-bottom: 5px;">ID: ${id}</div>
                        <div style="font-size: 0.65rem; color: var(--accent); margin-bottom: 10px; height: 12px;">
                            ${emailCliente ? "✉️ " + emailCliente : "Sem e-mail cadastrado"}
                        </div>
                        <div class="level-display">${statusStr === "OFFLINE" ? "--" : nivel}%</div>
                        <div class="last-update">Atualizado: ${ultima}</div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        // ==========================================
        // 5. ATUALIZAR A LISTA DO GRÁFICO (DROPDOWN)
        // ==========================================
        function atualizarDropdownList() {
            const selector = document.getElementById('client-selector');
            const valorAtual = selector.value;
            
            selector.innerHTML = '<option value="">Selecione um cliente...</option>';
            
            Object.keys(clientesData).forEach(id => {
                const dados = clientesData[id];
                const nomeCliente = dados.nome || id;
                
                const opt = document.createElement('option');
                opt.value = id;
                opt.innerText = `${nomeCliente} (ID: ${id})`;
                if (id === valorAtual) opt.selected = true; 
                selector.appendChild(opt);
            });
        }

        // ==========================================
        // 6. DESENHAR O GRÁFICO HISTÓRICO
        // ==========================================
        function atualizarGrafico() {
            const id = document.getElementById('client-selector').value;
            if (!id || !clientesData[id] || !clientesData[id].historico) return;

            const historicoObj = clientesData[id].historico;
            const registros = Object.values(historicoObj).sort((a, b) => a.timestamp - b.timestamp);
            
            const labels = [];
            const dadosNivel = [];
            const registrosFiltrados = registros.slice(-30);

            registrosFiltrados.forEach(reg => {
                const horaStr = reg.dataHora.split(', ')[1].substring(0, 5); 
                labels.push(horaStr);
                dadosNivel.push(reg.status === "OFFLINE" ? 0 : reg.nivel);
            });

            const ctx = document.getElementById('historyChart').getContext('2d');
            if (myChart) myChart.destroy();

            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = "'Montserrat', sans-serif";

            const nomeCliente = clientesData[id].nome || id;

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `Nível da Água (%) - ${nomeCliente}`,
                        data: dadosNivel,
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.2)',
                        borderWidth: 3,
                        pointBackgroundColor: '#0f172a',
                        pointBorderColor: '#38bdf8',
                        pointRadius: 4,
                        fill: true,
                        tension: 0.3 
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, max: 100, grid: { color: 'rgba(255, 255, 255, 0.05)' } }, x: { grid: { display: false } } },
                    plugins: { legend: { display: false } }
                }
            });
        }
    </script>
</body>
</html>
